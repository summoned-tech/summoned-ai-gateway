name: Build and publish Docker image

# Publishes the gateway Docker image to GHCR on:
#   - every push to main           → image tagged `main` and `sha-<git-sha>`
#   - every git tag matching v*    → image tagged with the version + `latest`
#
# Image: ghcr.io/summoned-tech/summoned-ai-gateway
#
# Users then run:
#   docker run -p 4000:4000 -e ADMIN_API_KEY=... -e OPENAI_API_KEY=sk-... \
#     ghcr.io/summoned-tech/summoned-ai-gateway:latest

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:  # allow manual runs from the Actions UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main branch          → `main`
            type=ref,event=branch
            # PRs                  → `pr-123`  (not pushed by default — no trigger)
            type=ref,event=pr
            # git SHA              → `sha-<7-chars>`
            type=sha
            # semantic version tag → `0.1.0`, `0.1`, `latest`
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64  # works on both Intel + Apple Silicon
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
